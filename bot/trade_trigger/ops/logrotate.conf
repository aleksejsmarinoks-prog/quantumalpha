# QuantumAlpha — log rotation config
# Install: sudo cp ops/logrotate.conf /etc/logrotate.d/quantumalpha
# Verify:  sudo logrotate -d /etc/logrotate.d/quantumalpha    (debug, dry run)
# Force:   sudo logrotate -f /etc/logrotate.d/quantumalpha
#
# Files covered:
#   - logs/qa.log              (main bot, currently 5.9MB / 50K lines after 6 days)
#   - logs/trade_trigger.log   (Trade Trigger bot — when running)

/home/qa/quantumalpha/logs/qa.log
/home/qa/quantumalpha/logs/trade_trigger.log
{
    daily
    rotate 14            # keep 14 days
    compress             # gzip rotated files
    delaycompress        # don't compress most recent rotation (still being read)
    missingok            # don't error if log file missing
    notifempty           # skip if file is empty
    copytruncate         # copy contents then truncate (NO restart needed —
                         #   important for systemd services with append: directive)
    create 0644 qa qa    # recreate with right ownership/perms after copytruncate
    su qa qa             # run rotation as qa user
    sharedscripts        # run postrotate once even if multiple files match
    postrotate
        # No service restart — copytruncate handles it for both bots.
        # If issues persist, may need: systemctl reload qa-bot.service
        :
    endscript
}
